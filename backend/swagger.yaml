paths:
  /dashboard:
    get:
      tags:
        - Authentication
      summary: Access the dashboard (protected route).
      operationId: getDashboard
      description: Retrieves user-specific dashboard data. Requires authentication via a valid JSON Web Token.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: URL Not Found
        500:
          description: Server Error
  
  /auth/login:
    post:
      tags:
        - Users
      summary: Login user.
      operationId: doLogin
      description: Allows a user with a valid account to log into the application. Generates a JSON Web Token.
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: loginItem
        description: Login credentials.
        schema:
          $ref: '#/definitions/Login'
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        403:
          description: Forbidden - Account pending admin verification
        404:
          description: URL Not Found
        500:
          description: Server Error
  
  /auth/signup:
    post:
      tags:
      - Users
      summary: Register user.
      operationId: signupUser
      description: Registers a new KnightWise user. Requires email verification.
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: signupItem
        description: User registration details.
        schema:
          $ref: '#/definitions/SignUp'
      responses:
        201:
          description: Created
        400:
          description: Bad Request
        404:
          description: URL Not Found
        500:
          description: Server Error
          
  /auth/sendotp:
    post:
      tags:
      - Authentication
      summary: Send user one-time password.
      operationId: sendOtp
      description: Sends a one-time password to the email for account verification. Used for both user and professor signup and password reset flows.
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: sendOtpItem
        description: OTP sending details.
        schema:
          $ref: '#/definitions/SendOTP'
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        404:
          description: URL Not Found
        500:
          description: Server Error
  
  /auth/verify:
    post:
      tags:
      - Authentication
      summary: Verify the one-time password.
      operationId: doVerify
      description: Validates the one-time password provided by the user during signup, ensuring it is correct and not expired.
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: verifyItem
        description: OTP verification details.
        schema:
          $ref: '#/definitions/Verify'
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        404:
          description: URL Not Found
        500:
          description: Server Error
  
  /auth/resetPassword:
    post:
      tags:
      - Users
      summary: Reset user password.
      operationId: doResetPassword
      description: Allows a user to reset their account password.
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: resetItem
        description: Password reset details.
        schema:
          $ref: '#/definitions/ResetPassword'
      responses:
        200:
          description: OK
        403:
          description: Forbidden
        404:
          description: URL Not Found
        500:
          description: Server Error

  /profauth/signup:
    post:
      tags:
      - Professors
      summary: Register professor.
      operationId: signupProfessor
      description: Registers a new professor account. Requires email OTP verification first. Account is created with VERIFIED = 0 and requires admin approval before login is permitted.
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: signupItem
        description: Professor registration details.
        schema:
          $ref: '#/definitions/SignUp'
      responses:
        201:
          description: Created
        400:
          description: Bad Request
        500:
          description: Server Error

  /users/{id}:
    get:
      tags:
        - Users
      summary: Fetch user profile info.
      operationId: getUserInfo
      description: Retrieves a user's profile information including currency, experience, and currently equipped store items.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
          description: The unique ID of the user.
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/UserInfoResponse'
        400:
          description: Bad Request - Invalid user ID
        401:
          description: Unauthorized
        404:
          description: User Not Found
        500:
          description: Server Error
    put:
      tags:
        - Users
      summary: Update user profile.
      operationId: updateUser
      description: Updates editable profile fields (first name, last name). Can only be performed by the account owner.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
          description: The unique ID of the user.
        - in: body
          name: updateUserItem
          description: Updated profile fields.
          schema:
            $ref: '#/definitions/UpdateUser'
      responses:
        200:
          description: OK
        400:
          description: Bad Request - Invalid user ID or name validation failed
        401:
          description: Unauthorized
        403:
          description: Forbidden - Can only update own profile
        404:
          description: User Not Found
        500:
          description: Server Error
    delete:
      tags:
        - Users
      summary: Delete user account.
      operationId: deleteAccount
      description: Deletes a user's account and all associated data. Can only be performed by the account owner.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
          description: The unique ID of the user.
      responses:
        200:
          description: OK
        400:
          description: Bad Request - Invalid user ID
        401:
          description: Unauthorized
        403:
          description: Forbidden - Can only delete own account
        404:
          description: User Not Found
        500:
          description: Server Error

  /users/{id}/purchases:
    get:
      tags:
        - Users
      summary: Fetch user's purchased store items.
      operationId: getPurchases
      description: Retrieves all store items purchased by the user, including equip state. Any authenticated user can view any user's purchases.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
          description: The unique ID of the user.
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/PurchasesResponse'
        400:
          description: Bad Request - Invalid user ID
        401:
          description: Unauthorized
        500:
          description: Server Error

  /users/{id}/equip:
    put:
      tags:
        - Users
      summary: Equip a purchased store item.
      operationId: equipItem
      description: |
        Equips a purchased store item for the user. Enforces equip limits per item type:
        - **Flair**: Max 3 equipped at once. Returns 409 if limit reached.
        - **Profile Picture**: Max 1 equipped at once. Automatically unequips the current profile picture when a new one is equipped.

        Can only be performed by the account owner.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
          description: The unique ID of the user.
        - in: body
          name: equipItem
          description: Item to equip.
          schema:
            $ref: '#/definitions/EquipItem'
      responses:
        200:
          description: OK
        400:
          description: Bad Request - Invalid user ID or item already equipped
        401:
          description: Unauthorized
        403:
          description: Forbidden - Can only equip for own account
        404:
          description: Item not purchased
        409:
          description: Conflict - Equip limit reached for item type
        500:
          description: Server Error

  /users/{id}/unequip:
    put:
      tags:
        - Users
      summary: Unequip a purchased store item.
      operationId: unequipItem
      description: Unequips a currently equipped store item for the user. Can only be performed by the account owner.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
          description: The unique ID of the user.
        - in: body
          name: unequipItem
          description: Item to unequip.
          schema:
            $ref: '#/definitions/EquipItem'
      responses:
        200:
          description: OK
        400:
          description: Bad Request - Invalid user ID or item not equipped
        401:
          description: Unauthorized
        403:
          description: Forbidden - Can only unequip for own account
        404:
          description: Item not purchased
        500:
          description: Server Error

  /store:
    get:
      tags:
        - Store
      summary: Fetch all store items.
      operationId: getStoreItems
      description: Retrieves metadata for all available store items.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/StoreItemsResponse'
        401:
          description: Unauthorized
        500:
          description: Server Error

  /store/{id}/purchase:
    post:
      tags:
        - Store
      summary: Purchase a store item with coins.
      operationId: purchaseItem
      description: Attempts to purchase a store item using the authenticated user's coins. Deducts coins and inserts a purchase record atomically. Item is not equipped on purchase.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
          description: The unique ID of the store item to purchase.
      responses:
        200:
          description: OK
        400:
          description: Bad Request - Invalid item ID or insufficient coins
        401:
          description: Unauthorized
        404:
          description: Item Not Found
        409:
          description: Conflict - Item already purchased
        500:
          description: Server Error

  /leaderboard/weekly:
    get:
      tags:
        - Users
      summary: Fetch weekly exp leaderboard.
      operationId: getWeeklyLeaderboard
      description: Returns users ranked by weekly exp using DENSE_RANK, paginated at PAGE_SIZE users per page. Includes the requesting user's rank and exp regardless of current page. Weekly exp resets every Monday at midnight UTC.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          type: integer
          description: Page number (default 1, PAGE_SIZE users per page, clamped to valid range)
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/LeaderboardResponse'
        401:
          description: Unauthorized
        500:
          description: Server Error

  /leaderboard/lifetime:
    get:
      tags:
        - Users
      summary: Fetch lifetime exp leaderboard.
      operationId: getLifetimeLeaderboard
      description: Returns users ranked by lifetime exp using DENSE_RANK, paginated at PAGE_SIZE users per page. Includes the requesting user's rank and exp regardless of current page. Lifetime exp never resets.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          type: integer
          description: Page number (default 1, PAGE_SIZE users per page, clamped to valid range)
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/LeaderboardResponse'
        401:
          description: Unauthorized
        500:
          description: Server Error

  /admin/createquestion:
    post:
      tags:
      - Admins
      - Professors
      summary: Create a question.
      operationId: createQuestion
      description: Creates a new question and its associated answer objects. Accessible by admin key or verified professor JWT. Professors can only submit questions under their own owner ID regardless of what is passed in.
  
  /admin/store/createitem:
    post:
      tags:
        - Admins
      summary: Create a store item.
      operationId: createStoreItem
      description: Creates a new store item available for purchase. Admin only.
      security:
        - BearerAuth: []
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: createStoreItemBody
          description: Store item details.
          schema:
            $ref: '#/definitions/CreateStoreItem'
      responses:
        201:
          description: Created
          schema:
            $ref: '#/definitions/CreateStoreItemResponse'
        400:
          description: Bad Request - Missing fields, invalid item type, or negative cost
        401:
          description: Unauthorized
        500:
          description: Server Error

  /admin/problems/{id}:
    get:
      tags:
      - Admins
      - Professors
      summary: Fetch question by ID.
      operationId: getAdminProblemById
      description: Fetches a question and its associated answers by ID. Accessible by admin key or verified professor JWT.
      security:
        - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        type: integer
        description: The unique ID of the question.
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Question Not Found
        500:
          description: Server Error
    put:
      tags:
      - Admins
      - Professors
      summary: Edit question by ID.
      operationId: editQuestion
      description: Replaces a question's content and all associated answers entirely. Auto-unpublishes the question if it was published. Professors can only edit their own questions. Admins can edit any question.
      security:
        - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        type: integer
        description: The unique ID of the question.
      - in: body
        name: questionItem
        description: Replacement question and answer details.
        schema:
          $ref: '#/definitions/EditQuestion'
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Question Not Found
        500:
          description: Server Error
    delete:
      tags:
      - Admins
      - Professors
      summary: Delete question by ID.
      operationId: deleteQuestion
      description: Deletes a question and all associated answers and responses. Professors can only delete their own questions. Admins can delete any question.
      security:
        - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        type: integer
        description: The unique ID of the question.
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Question Not Found
        500:
          description: Server Error

  /admin/problems/{id}/publish:
    post:
      tags:
      - Admins
      - Professors
      summary: Publish a draft question.
      operationId: publishQuestion
      description: Sets a draft question's IS_PUBLISHED flag to true, making it visible in topic practice and mock tests. Professors can only publish their own questions. Admins can publish any question.
      security:
        - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        type: integer
        description: The unique ID of the question.
      responses:
        200:
          description: OK
        400:
          description: Bad Request - Question already published
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Question Not Found
        500:
          description: Server Error

  /admin/drafts:
    get:
      tags:
      - Admins
      - Professors
      summary: Fetch draft question metadata.
      operationId: getQuestionsByStatus
      description: Returns metadata for all unpublished questions. Professors see only their own drafts. Admins see all drafts.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        500:
          description: Server Error

  /admin/published:
    get:
      tags:
      - Admins
      - Professors
      summary: Fetch published question metadata.
      operationId: getQuestionsByStatus
      description: Returns metadata for all published questions. Professors see only their own published questions. Admins see all published questions.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        500:
          description: Server Error

  /admin/users/{id}:
    delete:
      tags:
      - Admins
      summary: Delete user by ID.
      operationId: deleteUser
      description: Deletes a user account and all associated data. Admin only.
      security:
        - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        type: integer
        description: The unique ID of the user.
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        404:
          description: User Not Found
        500:
          description: Server Error

  /admin/createuser:
    post:
      tags:
      - Admins
      summary: Create a user bypassing verification.
      operationId: createUser
      description: Allows an admin to create a user account directly, bypassing email OTP verification. Admin only.
      security:
        - BearerAuth: []
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: signupItem
        description: User registration details.
        schema:
          $ref: '#/definitions/SignUp'
      responses:
        201:
          description: Created
        400:
          description: Bad Request
        401:
          description: Unauthorized
        500:
          description: Server Error

  /admin/getuser:
    get:
      tags:
      - Admins
      summary: Fetch user by ID or username.
      operationId: getUser
      description: Fetches a user by either their ID or username. Provide exactly one query parameter. Admin only.
      security:
        - BearerAuth: []
      parameters:
      - name: id
        in: query
        required: false
        type: integer
        description: The unique ID of the user.
      - name: username
        in: query
        required: false
        type: string
        description: The username of the user.
      responses:
        200:
          description: OK
        400:
          description: Bad Request - Provide username OR id, not both
        401:
          description: Unauthorized
        404:
          description: User Not Found
        500:
          description: Server Error

  /admin/unverifiedprofs:
    get:
      tags:
      - Admins
      summary: Fetch unverified professors.
      operationId: getUnverifiedProfs
      description: Returns a list of all professor accounts pending admin verification. Admin only.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        500:
          description: Server Error

  /admin/verifyprof/{id}:
    post:
      tags:
      - Admins
      summary: Verify a professor by ID.
      operationId: verifyProfessor
      description: Sets a professor's VERIFIED flag to true, allowing them to log in. Sends a verification approval email to the professor. Admin only.
      security:
        - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        type: integer
        description: The unique ID of the professor.
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        404:
          description: Professor Not Found
        500:
          description: Server Error
  

  /code/submitCode:
    post:
      tags:
      - Problems
      summary: Submit or test code against a programming question.
      operationId: submitCode
      description: |
        Submits code to Judge0 for execution. Supports two modes:
        - **Graded Submission** (`isTestRun: false`): Runs code against all test cases, grades the result, and records the response. Counts toward the daily submission limit (10/day).
        - **Test Run** (`isTestRun: true`): Runs code against only the first test case and returns raw output without grading or saving a response. Limited to 3 runs per problem per day.
      security:
        - BearerAuth: []
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: submitCodeItem
        description: Code submission details.
        schema:
          $ref: '#/definitions/SubmitCode'
      responses:
        200:
          description: OK
        400:
          description: Bad Request
        401:
          description: Unauthorized
        404:
          description: Question or Test Cases Not Found
        429:
          description: Submission or Test Run Limit Exceeded
        500:
          description: Server Error
        502:
          description: Judge0 Service Unavailable
        
  /code/canSubmit:
    get:
      tags:
        - Problems
      summary: Check whether the user can submit any more programming responses today.
      operationId: canSubmit
      description: |
        Checks the user's number of programming question submissions today and compares
        it to the maximum daily submission limit.
        Returns a JSON object with two fields:
        - canSubmit: true if the user has not yet reached the daily limit, false otherwise.
        - remaining: the number of programming question submissions the user has left today (0 if limit reached).
      security:
        - BearerAuth: []
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            type: object
            properties:
              canSubmit:
                type: boolean
                example: true
              remaining:
                type: integer
                example: 8
        401:
          description: Unauthorized
        500:
          description: Server Error

  /test/topic/{topicName}:
    get:
      tags:
      - Problems
      summary: Generate a topic practice session for a specific topic.
      operationId: getTopicQuestions
      description: |
        Retrieves all published questions for a given subcategory (e.g., Backtracking, Recursion).
        Programming questions are subject to the following restrictions:
        - At most one programming question is included per topic practice session.
        - If the user has reached their daily programming submission limit, no programming questions are included.
      security:
        - BearerAuth: []
      parameters:
      - name: topicName
        in: path
        required: true
        type: string
        description: The name of the topic/subcategory (e.g. Backtracking).
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        404:
          description: Topic Not Found
        500:
          description: Server Error
  
  /test/mocktest:
    get:
      tags:
      - Problems
      summary: Generate a mock test.
      operationId: getMockTest
      description: |
        Retrieves a randomly generated mock test with published questions from all sections (A, B, C, D).
        Programming questions are subject to the following restrictions:
        - At most one programming question is included per mock test.
        - If the user has reached their daily programming submission limit, no programming questions will be included in the mock test.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        404:
          description: Questions Not Found
        500:
          description: Server Error
  
  /test/submit:
    post:
      tags:
      - Problems
      summary: Submit answer to a question.
      operationId: submitAnswer
      description: |
        Submits user's answer to a question, grades it based on question type, and records the response. Supports multiple question types: Multiple Choice, Fill-In-the-Blanks, Select-All-That-Apply, Ranked Choice, and Drag-and-Drop. Serializes and stores user response as JSON, response structure varies by question type.
      security:
        - BearerAuth: []
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: submitItem
        description: Answer submission details.
        schema:
          $ref: '#/definitions/SubmitAnswer'
      responses:
        201:
          description: Answer submitted successfully
          schema:
            $ref: '#/definitions/SubmitResponse'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        404:
          description: Question Not Found
        500:
          description: Server Error
          
  /problems/{id}:
    get:
      tags:
      - Problems
      summary: Fetch problem by its ID.
      operationId: getProblemById
      description: Retrieves a published practice problem by its ID.
      parameters:
      - name: id
        in: path
        required: true
        type: string
        description: The unique ID of the problem.
      responses:
        200:
          description: OK
        404:
          description: URL Not Found
        500:
          description: Server Error
  
  /progress/graph:
    get:
      tags:
      - Users
      summary: Fetch user progress data for graph.
      operationId: getGraphData
      description: Retrieves user performance data for a radar chart visualization.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        404: 
          description: URL Not Found
        500:
          description: Server Error
  
  /progress/history:
    get:
      tags:
      - Users
      summary: Fetch user problem history.
      operationId: getHistory
      description: Retrieves the history of problems solved by the user in a paginated format.
      security:
        - BearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        type: integer
        description: Page number (default 1, 10 results per page)
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        500:
          description: Server Error
  
  /progress/messageData:
    get:
      tags:
      - Users
      summary: Fetch user progress message data.
      operationId: getMessage
      description: Generates a message that recommends practice topics and records the user's streak.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        404:
          description: URL Not Found
        500:
          description: Server Error

  /guilds/name/generate:
    get:
      tags:
        - Guilds
      summary: Generate a random guild name.
      operationId: generateGuildName
      description: |
        Returns a randomly generated guild name composed of an adjective and a plural noun from the backend word bank.
        - Guaranteed to return a name not already in use.
        - Intended to be called repeatedly during guild creation while the user shuffles names.
        - The name is not persisted until POST /guilds is called.
      security:
        - BearerAuth: []
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/GuildNameResponse'
        401:
          description: Unauthorized
        500:
          description: Server Error
        503:
          description: All possible guild name combinations are in use
          
securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Include the token in the Authorization header as 'Bearer your-token'"

definitions:
  Login:
    type: object
    required:
    - username
    - password
    properties:
      username:
        type: string
        example: "RickL"
      password:
        type: string
        example: "COP4331"
  
  SignUp:
    type: object
    required:
    - username
    - password
    - email
    - firstName
    - lastName
    properties:
      username:
        type: string
        example: "RickL"
      password:
        type: string
        example: "COP4331"
      email:
        type: string
        example: "rickl4331@hotmail.com"
      firstName:
        type: string
        example: "Rick"
      lastName:
        type: string
        example: "Leinecker"
  
  SendOTP:
    type: object
    required:
    - email
    - purpose
    properties:
      email:
        type: string
        example: "danlandsman@gmail.com"
      purpose:
        type: string
        example: "reset"
  
  Verify:
    type: object
    required:
    - email
    - otp
    properties:
      email:
        type: string
        example: "test123@yahoo.com"
      otp:
        type: integer
        example: 856923
  
  ResetPassword:
    type: object
    required:
    - email
    - password
    properties:
      email:
        type: string
        example: "johndoe64@aol.com"
      password:
        type: string
        example: "newPass123!"

  CreateQuestion:
    type: object
    required:
    - type
    - author_exam_id
    - section
    - category
    - subcategory
    - points_possible
    - question_text
    - is_published
    - answer_text
    - answer_correctness
    - answer_rank
    - answer_placement
    properties:
      type:
        type: string
        example: "Multiple Choice"
      author_exam_id:
        type: string
        example: "KnightWise"
      section:
        type: string
        example: "DSN"
      category:
        type: string
        example: "Programming"
      subcategory:
        type: string
        example: "Python"
      points_possible:
        type: number
        example: 5.0
      question_text:
        type: string
        example: "What is Python's print function?"
      owner_id:
        type: integer
        example: null
        description: Owner professor ID. Ignored for professor requests — always forced to the requesting professor's own ID.
      is_published:
        type: boolean
        example: false
        description: Whether to publish immediately or save as draft. Required.
      answer_text:
        type: array
        items:
          type: string
        example: ["print", "printf", "println", "put"]
      answer_correctness:
        type: array
        items:
          type: integer
        example: [1, 0, 0, 0]
        description: Which answer_text is considered a correct answer.
      answer_rank:
        type: array
        items:
          type: integer
        example: [1, 2, 3, 4]
        description: Correct ranking of answer_text options. Only used in Ranked Choice questions.
      answer_placement:
        type: array
        items:
          type: string
        example: ["a", "b", "c", "d"]
        description: Correct placement field for each of answer_text options. Only used in Drag and Drop questions.

  EditQuestion:
    type: object
    required:
    - type
    - author_exam_id
    - section
    - category
    - subcategory
    - points_possible
    - question_text
    - answer_text
    - answer_correctness
    - answer_rank
    - answer_placement
    properties:
      type:
        type: string
        example: "Multiple Choice"
      author_exam_id:
        type: string
        example: "KnightWise"
      section:
        type: string
        example: "DSN"
      category:
        type: string
        example: "Programming"
      subcategory:
        type: string
        example: "Python"
      points_possible:
        type: number
        example: 5.0
      question_text:
        type: string
        example: "What is Python's print function?"
      answer_text:
        type: array
        items:
          type: string
        example: ["print", "printf", "println", "put"]
      answer_correctness:
        type: array
        items:
          type: integer
        example: [1, 0, 0, 0]
        description: Which answer_text is considered a correct answer.
      answer_rank:
        type: array
        items:
          type: integer
        example: [1, 2, 3, 4]
        description: Correct ranking of answer_text options. Only used in Ranked Choice questions.
      answer_placement:
        type: array
        items:
          type: string
        example: ["a", "b", "c", "d"]
        description: Correct placement field for each of answer_text options. Only used in Drag and Drop questions.

  SubmitCode:
    type: object
    required:
    - problemId
    - code
    - languageId
    - isTestRun
    properties:
      problemId:
        type: integer
        example: 42
        description: The unique ID of the programming question.
      code:
        type: string
        example: "print('Hello World')"
        description: The code to execute.
      languageId:
        type: integer
        example: 71
        description: Judge0 language ID for the submitted code.
      isTestRun:
        type: boolean
        example: false
        description: If true, runs against first test case only without grading or saving. If false, runs full graded submission.
  
  SubmitAnswer:
    type: object
    required:
    - problem_id
    - userAnswer
    - category
    - topic
    properties:
      problem_id:
        type: integer
        example: 42
        description: The unique ID of the question being answered.
      userAnswer:
        description: "User's answer. Format varies by question type: string for Multiple Choice/Fill In Blanks, array of strings for Select All/Ranked Choice, object for Drag-and-Drop."
        example: "Paris"
      category:
        type: string
        example: "Programming Languages"
        description: The category of the question.
      topic:
        type: string
        example: "I/O"
        description: The subcategory/topic of the question.
  
  SubmitResponse:
    type: object
    properties:
      message:
        type: string
        example: "Answer submitted"
      isCorrect:
        type: boolean
        example: true
        description: Whether the answer was completely correct.
      pointsEarned:
        type: number
        example: 3.5
        description: Points earned for this answer (supports partial credit).
      pointsPossible:
        type: number
        example: 5
        description: Maximum points possible for this question.
      normalizedScore:
        type: number
        example: 0.7
        description: Score as a decimal from 0.0 to 1.0.
      feedback:
        type: string
        example: "Correct!"
        description: Feedback message explaining the result.
      passedTests:
        type: number
        example: 3
        description: Programming questions only - Number of test cases passed.
      totalTests:
        type: number
        example: 5
        description: Programming questions only - Total number of test cases for a question.
      allPassed:
        type: boolean
        example: true
        description: Programming questions only - Whether the answer passed all test cases.

  UpdateUser:
    type: object
    required:
      - newFirstName
      - newLastName
    properties:
      newFirstName:
        type: string
        example: "Jean-Jacques"
        description: "Allows letters, spaces, hyphens, apostrophes, periods, and accented/Unicode characters."
      newLastName:
        type: string
        example: "O'Malley"
        description: "Allows letters, spaces, hyphens, apostrophes, periods, and accented/Unicode characters."

  UserInfoResponse:
    type: object
    properties:
      user:
        type: object
        properties:
          ID:
            type: integer
            example: 1
          USERNAME:
            type: string
            example: "RickL"
            nullable: true
          FIRSTNAME:
            type: string
            example: "Rick"
            nullable: true
          LASTNAME:
            type: string
            example: "Leinecker"
            nullable: true
          LIFETIME_EXP:
            type: number
            example: 1250.0
          WEEKLY_EXP:
            type: number
            example: 300.0
          DAILY_EXP:
            type: number
            example: 57.5
          COINS:
            type: number
            example: 450.0
      equippedItems:
        type: array
        items:
          $ref: '#/definitions/StoreItem'

  PurchasesResponse:
    type: object
    properties:
      purchases:
        type: array
        items:
          $ref: '#/definitions/PurchasedItem'

  PurchasedItem:
    type: object
    properties:
      ID:
        type: integer
        example: 1
      TYPE:
        type: string
        example: "flair"
        description: "Item type. One of: flair, profile_picture, background"
      COST:
        type: string
        example: "50.00"
        description: "Returned as string due to MySQL DECIMAL serialization."
      NAME:
        type: string
        example: "Greatest of all Time"
      IS_EQUIPPED:
        type: integer
        example: 0
        description: "1 if equipped, 0 if not."

  StoreItem:
    type: object
    properties:
      ID:
        type: integer
        example: 1
      TYPE:
        type: string
        example: "flair"
        description: "Item type. One of: flair, profile_picture, background"
      COST:
        type: string
        example: "50.00"
        description: "Returned as string due to MySQL DECIMAL serialization."
      NAME:
        type: string
        example: "Greatest of all Time"

  StoreItemsResponse:
    type: object
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/StoreItem'

  EquipItem:
    type: object
    required:
      - itemId
    properties:
      itemId:
        type: integer
        example: 1
        description: The unique ID of the store item to equip or unequip.

  CreateStoreItem:
    type: object
    required:
      - itemType
      - itemCost
      - itemName
    properties:
      itemType:
        type: string
        example: "flair"
        description: "Must be a valid item type. One of: flair, profile_picture, background"
      itemCost:
        type: number
        example: 50
        description: "Cost in coins. Must be a non-negative number."
      itemName:
        type: string
        example: "Greatest of all Time"

  CreateStoreItemResponse:
    type: object
    properties:
      message:
        type: string
        example: "Store item successfully created"
      itemId:
        type: integer
        example: 1

  LeaderboardResponse:
    type: object
    properties:
      userRank:
        type: integer
        example: 3
        description: Requesting user's rank across all users, regardless of current page.
      userExp:
        type: number
        example: 450
        description: Requesting user's exp value.
      page:
        type: integer
        example: 1
        description: Current page number.
      totalPages:
        type: integer
        example: 1
        description: Total number of pages at PAGE_SIZE users per page.
      leaderboard:
        type: array
        items:
          type: object
          properties:
            rank:
              type: integer
              example: 1
            username:
              type: string
              example: "RickL"
            firstName:
              type: string
              example: "Rick"
              nullable: true
            exp:
              type: number
              example: 900
            profilePicture:
              type: string
              example: "Octocat"
              nullable: true
        description: "Page of users ranked by exp. Tied users share the same rank. PAGE_SIZE users per page."

  GuildNameResponse:
    type: object
    properties:
      name:
        type: string
        example: "Blazing Dragons"

host: www.knightwise.dev
basePath: /api
schemes:
  - https