          description: Answer submitted successfully
          schema:
            $ref: '#/definitions/SubmitResponse'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        404:
          description: Question Not Found
        500:
          description: Server Error
          
  /problems/{id}:
    get:
      tags:
      - Problems
      summary: Fetch problem by its ID.
      operationId: getProblemById
      description: Retrieves a published practice problem by its ID.
      parameters:
      - name: id
        in: path
        required: true
        type: string
        description: The unique ID of the problem.
      responses:
        200:
          description: OK
        404:
          description: URL Not Found
        500:
          description: Server Error

  /problems:
    get:
      tags:
        - Problems
        - Professors
        - Admins
      summary: Fetch published questions broken down by subcategory.
      operationId: getProblems
      description: |
        Returns all published questions grouped by subcategory and paginated
        at PAGE_SIZES.PROF_QUESTIONS questions per page.
 
        Intended for professor-facing analytics views: professors select a
        question from this list and then call GET /stats/aggregate/{questionId}
        to see its aggregate stats.
 
        **Query parameters**
        - `mine=true`: restrict results to questions owned by the requesting professor. Ignored for admins (admins don't 'own' questions in the general app use case).
        - `subcategory`: Optional case-insensitive subcategory filter, accepts a single value or a comma-separated list (e.g. Arrays or Arrays,recursion,SoRtInG). Omit to return all subcategories.
        - `page`: page number (default 1, clamped to valid range).
      security:
        - BearerAuth: []
      parameters:
        - name: mine
          in: query
          required: false
          type: boolean
          description: |
            When true, returns only questions owned by the requesting professor.
            - Has no effect for admin callers.
          example: true
        - name: subcategory
          in: query
          required: false
          type: string
          description: |
            Filter results to one or more subcategories.
            - Accepts a single value or a comma-separated list (e.g. Arrays or Arrays,recursion,SoRtInG).
            - Omit to return all subcategories.
          example: Arrays,Recursion
        - name: page
          in: query
          required: false
          type: integer
          description: |
            Page number (default 1, PAGE_SIZES.PROF_QUESTIONS questions per page, clamped to valid range).
          example: 1
      produces:
        - application/json
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/ProblemsResponse'
        401:
          description: Unauthorized
        403:
          description: Forbidden - Professor or admin access only
        500:
          description: Server Error
  
  /progress/graph:
    get:
      tags:
      - Users
      summary: Fetch user progress data for graph.
      operationId: getGraphData
      description: Retrieves user performance data for a radar chart visualization using the KnightWise analytics engine. Returns per-topic weighted performance metrics.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/ProgressGraphResponse'
        401:
          description: Unauthorized
        500:
          description: Server Error
  
  /progress/history:
    get:
      tags:
      - Users
      summary: Fetch user problem history.
      operationId: getHistory
      description: Retrieves the history of problems solved by the user in a paginated format.
      security:
        - BearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        type: integer
        description: Page number (default 1, 10 results per page)
      responses:
        200:
          description: OK
        401:
          description: Unauthorized
        500:
          description: Server Error
  
  /progress/messageData:
    get:
      tags:
      - Users
      summary: Fetch user progress message data.
      operationId: getMessage
      description: Returns mastery levels, strongest and weakest topics, and streak data using the KnightWise analytics engine.
      security:
        - BearerAuth: []
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/MessageDataResponse'
        401:
          description: Unauthorized
        500:
          description: Server Error

securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Include the token in the Authorization header as 'Bearer your-token'"

definitions:
  Login:
    type: object
    required:
    - username
    - password
    properties:
      username:
        type: string
        example: "RickL"
      password:
        type: string
        example: "COP4331"
  
  SignUp:
    type: object
    required:
    - username
    - password
    - email
    - firstName
    - lastName
    properties:
      username:
        type: string
        example: "RickL"
      password:
        type: string
        example: "COP4331"
      email:
        type: string
        example: "rickl4331@hotmail.com"
      firstName:
        type: string
        example: "Rick"
      lastName:
        type: string
        example: "Leinecker"
  
  SendOTP:
    type: object
    required:
    - email
    - purpose
    properties:
      email:
        type: string
        example: "danlandsman@gmail.com"
      purpose:
        type: string
        example: "reset"
  
  Verify:
    type: object
    required:
    - email
    - otp
    properties:
      email:
        type: string
        example: "test123@yahoo.com"
      otp:
        type: integer
        example: 856923
  
  ResetPassword:
    type: object
    required:
    - email
    - password
    properties:
      email:
        type: string
        example: "johndoe64@aol.com"
      password:
        type: string
        example: "newPass123!"

  CreateQuestion:
    type: object
    required:
    - type
    - author_exam_id
    - section
    - category
    - subcategory
    - points_possible
    - question_text
    - is_published
    - answer_text
    - answer_correctness
    - answer_rank
    - answer_placement
    properties:
      type:
        type: string
        example: "Multiple Choice"
      author_exam_id:
        type: string
        example: "KnightWise"
      section:
        type: string
        example: "DSN"
      category:
        type: string
        example: "Programming"
      subcategory:
        type: string
        example: "Python"
      points_possible:
        type: number
        example: 5.0
      question_text:
        type: string
        example: "What is Python's print function?"
      owner_id:
        type: integer
        example: null
        description: Owner professor ID. Ignored for professor requests — always forced to the requesting professor's own ID.
      is_published:
        type: boolean
        example: false
        description: Whether to publish immediately or save as draft. Required.
      answer_text:
        type: array
        items:
          type: string
        example: ["print", "printf", "println", "put"]
      answer_correctness:
        type: array
        items:
          type: integer
        example: [1, 0, 0, 0]
        description: Which answer_text is considered a correct answer.
      answer_rank:
        type: array
        items:
          type: integer
        example: [1, 2, 3, 4]
        description: Correct ranking of answer_text options. Only used in Ranked Choice questions.
      answer_placement:
        type: array
        items:
          type: string
        example: ["a", "b", "c", "d"]
        description: Correct placement field for each of answer_text options. Only used in Drag and Drop questions.

  EditQuestion:
    type: object
    required:
    - type
    - author_exam_id
    - section
    - category
    - subcategory
    - points_possible
    - question_text
    - answer_text
    - answer_correctness
    - answer_rank
    - answer_placement
    properties:
      type:
        type: string
        example: "Multiple Choice"
      author_exam_id:
        type: string
        example: "KnightWise"
      section:
        type: string
        example: "DSN"
      category:
        type: string
        example: "Programming"
      subcategory:
        type: string
        example: "Python"
      points_possible:
        type: number
        example: 5.0
      question_text:
        type: string
        example: "What is Python's print function?"
      answer_text:
        type: array
        items:
          type: string
        example: ["print", "printf", "println", "put"]
      answer_correctness:
        type: array
        items:
          type: integer
        example: [1, 0, 0, 0]
        description: Which answer_text is considered a correct answer.
      answer_rank:
        type: array
        items:
          type: integer
        example: [1, 2, 3, 4]
        description: Correct ranking of answer_text options. Only used in Ranked Choice questions.
      answer_placement:
        type: array
        items:
          type: string
        example: ["a", "b", "c", "d"]
        description: Correct placement field for each of answer_text options. Only used in Drag and Drop questions.

  SubmitCode:
    type: object
    required:
    - problemId
    - code
    - languageId
    - isTestRun
    properties:
      problemId:
        type: integer
        example: 42
        description: The unique ID of the programming question.
      code:
        type: string
        example: "print('Hello World')"
        description: The code to execute.
      languageId:
        type: integer
        example: 71
        description: Judge0 language ID for the submitted code.
      isTestRun:
        type: boolean
        example: false
        description: If true, runs against first test case only without grading or saving. If false, runs full graded submission.
      elapsedTime:
        type: integer
        example: 45
        description: Time in seconds from question display to submission. Optional, null if not provided.
  
  SubmitAnswer:
    type: object
    required:
    - problem_id
    - userAnswer
    - category
    - topic
    properties:
      problem_id:
        type: integer
        example: 42
        description: The unique ID of the question being answered.
      userAnswer:
        description: "User's answer. Format varies by question type: string for Multiple Choice/Fill In Blanks, array of strings for Select All/Ranked Choice, object for Drag-and-Drop."
        example: "Paris"
      category:
        type: string
        example: "Programming Languages"
        description: The category of the question.
      topic:
        type: string
        example: "I/O"
        description: The subcategory/topic of the question.
      elapsedTime:
        type: integer
        example: 45
        description: Time in seconds from question display to submission. Optional, null if not provided.
  
  SubmitResponse:
    type: object
    properties:
      message:
        type: string
        example: "Answer submitted"
      isCorrect:
        type: boolean
        example: true
        description: Whether the answer was completely correct.
      pointsEarned:
        type: number
        example: 3.5
        description: Points earned for this answer (supports partial credit).
      pointsPossible:
        type: number
        example: 5
        description: Maximum points possible for this question.
      normalizedScore:
        type: number
        example: 0.7
        description: Score as a decimal from 0.0 to 1.0.
      feedback:
        type: string
        example: "Correct!"
        description: Feedback message explaining the result.
      passedTests:
        type: number
        example: 3
        description: Programming questions only - Number of test cases passed.
      totalTests:
        type: number
        example: 5
        description: Programming questions only - Total number of test cases for a question.
      allPassed:
        type: boolean
        example: true
        description: Programming questions only - Whether the answer passed all test cases.

  ProblemsResponse:
    type: object
    properties:
      questions:
        type: object
        description: |
          Published questions grouped by subcategory. 
          - Keys are subcategory name strings.
          - Each value is an array of question objects with their associated answers.
          - Empty object when no matching questions exist.
        additionalProperties:
          type: array
          items:
            $ref: '#/definitions/ProblemWithAnswers'
      pagination:
        type: object
        properties:
          page:
            type: integer
            example: 1
            description: The actual page returned (clamped to valid range).
          pageSize:
            type: integer
            example: 10
            description: Number of questions per page (PAGE_SIZES.PROF_QUESTIONS).
          totalQuestions:
            type: integer
            example: 24
            description: Total matching published questions across all pages.
          totalPages:
            type: integer
            example: 3
            description: Total number of pages for this query.
 
  ProblemWithAnswers:
    type: object
    properties:
      ID:
        type: integer
        example: 42
      TYPE:
        type: string
        example: "Multiple Choice"
      SECTION:
        type: string
        example: "A"
      CATEGORY:
        type: string
        example: "Data Structures"
      SUBCATEGORY:
        type: string
        example: "Arrays"
      POINTS_POSSIBLE:
        type: number
        example: 5.0
      QUESTION_TEXT:
        type: string
        example: "What is the time complexity of binary search?"
      OWNER_ID:
        type: integer
        example: 7
        nullable: true
      answers:
        type: array
        description: Associated answer rows from the AnswerText table.
        items:
          type: object
          properties:
            ID:
              type: integer
              example: 101
            QUESTION_ID:
              type: integer
              example: 42
            ANSWER_TEXT:
              type: string
              example: "O(log n)"
            IS_CORRECT:
              type: integer
              example: 1
            RANK:
              type: integer
              example: 1
              nullable: true
            PLACEMENT:
              type: string
              example: ""
              nullable: true

  UpdateUser:
    type: object
    required:
      - newFirstName
      - newLastName
    properties:
      newFirstName:
        type: string
        example: "Jean-Jacques"
        description: "Allows letters, spaces, hyphens, apostrophes, periods, and accented/Unicode characters."
      newLastName:
        type: string
        example: "O'Malley"
        description: "Allows letters, spaces, hyphens, apostrophes, periods, and accented/Unicode characters."

  UserInfoResponse:
    type: object
    properties:
      user:
        type: object
        properties:
          ID:
            type: integer
            example: 1
          USERNAME:
            type: string
            example: "RickL"
            nullable: true
          FIRSTNAME:
            type: string
            example: "Rick"
            nullable: true
          LASTNAME:
            type: string
            example: "Leinecker"
            nullable: true
          LIFETIME_EXP:
            type: number
            example: 1250.0
          WEEKLY_EXP:
            type: number
            example: 300.0
          DAILY_EXP:
            type: number
            example: 57.5
          COINS:
            type: number
            example: 450.0
          IS_SHARING_STATS:
            type: boolean
            example: false
            description: "True if user opted into sharing aggregate statistics, false otherwise."
      equippedItems:
        type: array
        items:
          $ref: '#/definitions/StoreItem'

  FollowListResponse:
    type: object
    properties:
      followers:
        type: array
        items:
          $ref: '#/definitions/FollowUser'
        description: Present on /followers endpoint.
      followed:
        type: array
        items:
          $ref: '#/definitions/FollowUser'
        description: Present on /followed endpoint.

  FollowUser:
    type: object
    properties:
      ID:
        type: integer
        example: 42
      USERNAME:
        type: string
        example: "knightking"
        nullable: true
      FIRSTNAME:
        type: string
        example: "Arthur"
        nullable: true
      LASTNAME:
        type: string
        example: "Pendragon"
        nullable: true
      profilePicture:
        type: string
        example: "Octocat"
        nullable: true
        description: Name of the user's equipped profile picture item, or null if none equipped.

  UserSearchResponse:
    type: object
    properties:
      users:
        type: array
        items:
          type: object
          properties:
            ID:
              type: integer
              example: 42
            USERNAME:
              type: string
              example: "knightking"
            FIRSTNAME:
              type: string
              example: "Arthur"
              nullable: true
            LASTNAME:
              type: string
              example: "Pendragon"
              nullable: true
      pagination:
        type: object
        properties:
          page:
            type: integer
            example: 1
            description: The actual page returned (clamped to valid range).
          pageSize:
            type: integer
            example: 20
            description: Number of results per page.
          totalUsers:
            type: integer
            example: 3
            description: Total number of matching users across all pages.
          totalPages:
            type: integer
            example: 1
            description: Total number of pages for this query.

  PurchasesResponse:
    type: object
    properties:
      purchases:
        type: array
        items:
          $ref: '#/definitions/PurchasedItem'

  PurchasedItem:
    type: object
    properties:
      ID:
        type: integer
        example: 1
      TYPE:
        type: string
        example: "flair"
        description: "Item type. One of: flair, profile_picture, background"
      COST:
        type: string
        example: "50.00"
        description: "Returned as string due to MySQL DECIMAL serialization."
      NAME:
        type: string
        example: "Greatest of all Time"
      IS_EQUIPPED:
        type: integer
        example: 0
        description: "1 if equipped, 0 if not."

  StoreItem:
    type: object
    properties:
      ID:
        type: integer
        example: 1
      TYPE:
        type: string
        example: "flair"
        description: "Item type. One of: flair, profile_picture, background"
      COST:
        type: string
        example: "50.00"
        description: "Returned as string due to MySQL DECIMAL serialization."
      NAME:
        type: string
        example: "Greatest of all Time"
      IS_GUILD_ITEM:
        type: integer
        example: 0
        description: "1 if this is a guild store item, 0 if it is a user store item."

  StoreItemsResponse:
    type: object
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/StoreItem'

  EquipItem:
    type: object
    required:
      - itemId
    properties:
      itemId:
        type: integer
        example: 1
        description: The unique ID of the store item to equip or unequip.

  CreateStoreItem:
    type: object
    required:
      - itemType
      - itemCost
      - itemName
    properties:
      itemType:
        type: string
        example: "flair"
        description: "Must be a valid item type. One of: flair, profile_picture, background"
      itemCost:
        type: number
        example: 50
        description: "Cost in coins. Must be a non-negative number."
      itemName:
        type: string
        example: "Greatest of all Time"
      isGuildItem:
        type: boolean
        example: false
        description: "If true, item appears in the guild store and can be unlocked via coin contribution. Defaults to false."

  CreateStoreItemResponse:
    type: object
    properties:
      message:
        type: string
        example: "Store item successfully created"
      itemId:
        type: integer
        example: 1

  LeaderboardResponse:
    type: object
    properties:
      userRank:
        type: integer
        example: 3
        description: Requesting user's rank across all users, regardless of current page.
      userExp:
        type: number
        example: 450
        description: Requesting user's exp value.
      page:
        type: integer
        example: 1
        description: Current page number.
      totalPages:
        type: integer
        example: 1
        description: Total number of pages at PAGE_SIZES.LEADERBOARD users per page.
      leaderboard:
        type: array
        items:
          type: object
          properties:
            rank:
              type: integer
              example: 1
            username:
              type: string
              example: "RickL"
            firstName:
              type: string
              example: "Rick"
              nullable: true
            exp:
              type: number
              example: 900
            profilePicture:
              type: string
              example: "Octocat"
              nullable: true
        description: "Page of users ranked by exp. Tied users share the same rank. PAGE_SIZES.LEADERBOARD users per page."

  GuildLeaderboardResponse:
    type: object
    properties:
      guildRank:
        type: integer
        example: 2
        nullable: true
        description: Requesting user's guild rank. Null if user is not in a guild.
      guildExp:
        type: number
        example: 600
        nullable: true
        description: Requesting user's guild exp value. Null if user is not in a guild.
      guildId:
        type: integer
        example: 7
        nullable: true
        description: Requesting user's guild ID. Null if user is not in a guild.
      page:
        type: integer
        example: 1
        description: Current page number.
      totalPages:
        type: integer
        example: 1
        description: Total number of pages at PAGE_SIZES.LEADERBOARD_GUILD guilds per page.
      leaderboard:
        type: array
        items:
          type: object
          properties:
            rank:
              type: integer
              example: 1
            id:
              type: integer
              example: 3
            name:
              type: string
              example: "Ancient Wolves"
            exp:
              type: number
              example: 9000
            guildPicture:
              type: string
              example: "Golden Shield"
              nullable: true
        description: "Page of guilds ranked by exp. Tied guilds share the same rank. PAGE_SIZES.LEADERBOARD_GUILD guilds per page."

  GuildNameResponse:
    type: object
    properties:
      name:
        type: string
        example: "Blazing Dragons"

  CreateGuild:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        example: "Ancient Wolves"
        description: The name for the new guild. Must be unique.

  CreateGuildResponse:
    type: object
    properties:
      message:
        type: string
        example: "Guild created successfully"
      guildId:
        type: integer
        example: 7

  GuildInfoResponse:
    type: object
    properties:
      guild:
        type: object
        properties:
          ID:
            type: integer
            example: 7
          NAME:
            type: string
            example: "Ancient Wolves"
          OWNER_ID:
            type: integer
            example: 1
          LIFETIME_EXP:
            type: number
            example: 5000.0
          WEEKLY_EXP:
            type: number
            example: 800.0
          DAILY_EXP:
            type: number
            example: 120.0
          COINS:
            type: number
            example: 2500.0
          ESTABLISHED:
            type: string
            example: "2026-01-15T00:00:00.000Z"
          IS_OPEN:
            type: integer
            example: 1
            description: "1 if guild is accepting join requests, 0 if not."
      equippedItems:
        type: array
        items:
          $ref: '#/definitions/StoreItem'
        description: Currently equipped guild store items.
      members:
        type: array
        items:
          $ref: '#/definitions/GuildMember'
        description: Guild members ordered by role (Owner, Officer, Member) then username.
      unlockedItems:
        type: array
        items:
          $ref: '#/definitions/GuildUnlockedItem'
        description: All store items unlocked by the guild via coin contribution, including equipped and unequipped.

  UpdateGuildOpen:
    type: object
    required:
      - isOpen
    properties:
      isOpen:
        type: boolean
        example: true
        description: True to allow join requests, false to block them.

  UpdateGuildOpenResponse:
    type: object
    properties:
      message:
        type: string
        example: "Guild is now open to join requests"
      isOpen:
        type: boolean
        example: true

  GuildUnlockedItem:
    type: object
    properties:
      ID:
        type: integer
        example: 1
      TYPE:
        type: string
        example: "profile_picture"
        description: "Item type. One of: flair, profile_picture, background"
      COST:
        type: string
        example: "100.00"
        description: "Coin threshold required to unlock. Returned as string due to MySQL DECIMAL serialization."
      NAME:
        type: string
        example: "Golden Shield"
      IS_EQUIPPED:
        type: integer
        example: 0
        description: "1 if currently equipped by the guild, 0 if unlocked but not equipped."

  ContributeCoins:
    type: object
    required:
      - amount
    properties:
      amount:
        type: number
        example: 100
        description: Number of coins to contribute. Must be a positive number and cannot exceed user's current balance.

  ContributeCoinsResponse:
    type: object
    properties:
      message:
        type: string
        example: "Contribution successful"
      coinBank:
        type: number
        example: 2600
        description: Updated guild coin bank total after contribution.
      newlyUnlocked:
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
              example: 5
            name:
              type: string
              example: "Guild Banner"
            type:
              type: string
              example: "flair"
        description: Guild store items newly unlocked by this contribution. Empty array if none.

  UpdateMemberRole:
    type: object
    required:
      - newRole
    properties:
      newRole:
        type: string
        example: "Officer"
        description: "New role to assign. Must be 'Member' or 'Officer'. Owner role cannot be assigned via this endpoint."

  GuildInvite:
    type: object
    required:
      - targetUserId
    properties:
      targetUserId:
        type: integer
        example: 42
        description: The unique ID of the user to invite.

  ResolveEntry:
    type: object
    required:
      - action
    properties:
      action:
        type: string
        example: "accept"
        description: "Must be 'accept' or 'reject'."
      confirmLeave:
        type: boolean
        example: true
        description: |
          Required only when accepting and the target user is already a member of another guild.
          Set to true to confirm leaving the old guild and joining the new one atomically.
          If omitted when required, the response will include requiresConfirmation: true and no action will be taken.

  ResolveEntryResponse:
    type: object
    properties:
      message:
        type: string
        example: "Entry accepted, user is now a guild member"
      requiresConfirmation:
        type: boolean
        example: true
        nullable: true
        description: |
          Present and true only when the target user is already in another guild and confirmLeave was not provided.
          Frontend should prompt the user to confirm leaving their current guild before resubmitting with confirmLeave: true.

  GuildInvitesResponse:
    type: object
    properties:
      invites:
        type: array
        items:
          type: object
          properties:
            GUILD_ID:
              type: integer
              example: 7
            guildName:
              type: string
              example: "Ancient Wolves"
            OWNER_ID:
              type: integer
              example: 1

  GuildRequestsResponse:
    type: object
    properties:
      requests:
        type: array
        items:
          type: object
          properties:
            USER_ID:
              type: integer
              example: 42
            USERNAME:
              type: string
              example: "knightking"
            FIRSTNAME:
              type: string
              example: "Arthur"
              nullable: true
            LASTNAME:
              type: string
              example: "Pendragon"
              nullable: true

  GuildMember:
    type: object
    properties:
      ID:
        type: integer
        example: 1
      USERNAME:
        type: string
        example: "knightking"
        nullable: true
      FIRSTNAME:
        type: string
        example: "Arthur"
        nullable: true
      LASTNAME:
        type: string
        example: "Pendragon"
        nullable: true
      ROLE:
        type: string
        example: "Officer"
        description: "Guild role. One of: Owner, Officer, Member"
      COINS_CONTRIBUTED:
        type: number
        example: 250.0
        description: Total coins this member has contributed to the guild bank.
      JOINED:
        type: string
        example: "2026-01-15T00:00:00.000Z"
        description: UTC datetime when the member joined the guild.

  StatsOptIn:
    type: object
    required:
      - optIn
    properties:
      optIn:
        type: boolean
        example: true
        description: True to include this user's responses in aggregate stats, false to exclude.

  StatsOptInResponse:
    type: object
    properties:
      message:
        type: string
        example: "Stats sharing enabled"
      optIn:
        type: boolean
        example: true

  AggregateStatsResponse:
    type: object
    properties:
      medianAccuracy:
        type: number
        example: 0.75
        nullable: true
        description: Median normalized score (0-1) across all opted-in responses. Null if no data.
      medianElapsedTime:
        type: number
        example: 60
        nullable: true
        description: Median elapsed time in seconds across opted-in responses with non-null times. Null if no data.
      responseCount:
        type: integer
        example: 120
        description: Total number of opted-in responses included in the calculation.
      subcategoryBreakdown:
        type: object
        description: Per-subcategory aggregate stats. Keys are Question.SUBCATEGORY strings.
        additionalProperties:
          type: object
          properties:
            medianAccuracy:
              type: number
              example: 0.6
              nullable: true
            medianElapsedTime:
              type: number
              example: 45
              nullable: true
            responseCount:
              type: integer
              example: 30

  AggregateStatsByQuestionResponse:
    type: object
    properties:
      questionId:
        type: integer
        example: 42
      medianAccuracy:
        type: number
        example: 0.5
        nullable: true
        description: Median normalized score (0-1) across opted-in responses for this question. Null if no data.
      medianElapsedTime:
        type: number
        example: 60
        nullable: true
        description: Median elapsed time in seconds across opted-in responses for this question. Null if no data.
      responseCount:
        type: integer
        example: 3
        description: Number of opted-in responses for this question.

  ProgressGraphResponse:
    type: object
    properties:
      progress:
        type: object
        description: Map of topic name to performance metric data. Keys are Response.TOPIC strings.
        additionalProperties:
          type: object
          properties:
            metric:
              type: number
              example: 0.7342
              description: Point-weighted performance metric from 0.0 to 1.0. Higher is better.
            responseCount:
              type: integer
              example: 12
              description: Number of responses contributing to this topic's metric.

  MessageDataResponse:
    type: object
    properties:
      history:
        type: array
        items:
          type: object
          properties:
            datetime:
              type: string
              example: "2026-03-15T14:30:00.000Z"
            topic:
              type: string
              example: "Arrays"
      mastery:
        type: object
        description: Map of topic name to weighted performance metric (0.0 to 1.0).
        additionalProperties:
          type: number
          example: 0.6821
      strongestTopics:
        type: array
        items:
          type: string
        example: ["Trees", "Recursion", "Sorting"]
        description: Up to 3 topics with the highest performance metrics.
      weakestTopics:
        type: array
        items:
          type: string
        example: ["Variables", "InputOutput", "Branching"]
        description: Up to 3 topics with the lowest performance metrics.
      streak:
        type: integer
        example: 5
        description: Number of consecutive days the user has submitted at least one answer.

host: www.knightwise.dev
basePath: /api
schemes:
  - https